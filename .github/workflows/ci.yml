name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Compact compiler
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/midnightntwrk/compact/releases/latest/download/compact-installer.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Pin Compact CLI
        run: compact update 0.31.0

      - name: Compile contract
        run: |
          cd contract
          compact compile src/zk_promo.compact managed
          cd ..
          cp -r contract/managed cli/managed

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install contract runtime deps
        # The compiled contract module (contract/managed/contract/index.js) imports
        # @midnight-ntwrk/compact-runtime, which lives in contract/node_modules —
        # the cli/ install above doesn't cover it.
        working-directory: contract
        run: npm ci

      - name: Install CLI deps
        working-directory: cli
        run: npm ci

      - name: Build
        working-directory: cli
        run: npm run build

      - name: Run contract tests
        working-directory: cli
        run: node dist/test-cli.js

      # Test #12 in cli/src/test.ts asserts that hashPromoCode (operator) produces
      # the same bytes as persistentHash (on-chain) for the canonical 'WINTER24'
      # input. That covers the hash-equality invariant — no separate shell check needed.
